<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 290" role="img" aria-label="LCR Engenharia">
  <title>LCR Engenharia</title>
  <!-- Bloco superior: letras LCR em vermelho LCR -->
  <text x="340" y="185"
        text-anchor="middle"
        fill="#D32027"
        font-family="'Manrope','Inter','Arial Black',sans-serif"
        font-size="230"
